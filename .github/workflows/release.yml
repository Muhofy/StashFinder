name: Release

on:
  push:
    tags:
      - 'v*.*.*'        # v1.0.0, v1.0.0-beta1, v1.0.0-rc1 gibi taglarda tetiklenir

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # release oluşturmak için gerekli

    steps:
      # ── Checkout ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 21 ─────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── Gradle cache ────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── Tag'den suffix belirle ──────────────────────────────
      # v1.0.0         → stable
      # v1.0.0-beta1   → beta
      # v1.0.0-alpha1  → alpha
      # v1.0.0-rc1     → rc
      - name: Determine version suffix
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"           # örn: v1.0.0-beta3
          VERSION="${TAG#v}"                 # örn: 1.0.0-beta3

          if [[ "$VERSION" == *"-beta"* ]]; then
            SUFFIX="beta"
            PRERELEASE="true"
          elif [[ "$VERSION" == *"-alpha"* ]]; then
            SUFFIX="alpha"
            PRERELEASE="true"
          elif [[ "$VERSION" == *"-rc"* ]]; then
            SUFFIX="rc"
            PRERELEASE="true"
          else
            SUFFIX="stable"
            PRERELEASE="false"
          fi

          echo "tag=$TAG"           >> $GITHUB_OUTPUT
          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "suffix=$SUFFIX"     >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

      # ── gradle.properties'e suffix yaz ─────────────────────
      - name: Set version suffix in gradle.properties
        run: |
          sed -i "s/^version_suffix=.*/version_suffix=${{ steps.version.outputs.suffix }}/" gradle.properties

      # ── Build ───────────────────────────────────────────────
      - name: Build with Gradle
        run: ./gradlew build

      # ── JAR bul ─────────────────────────────────────────────
      - name: Find JAR
        id: jar
        run: |
          SUFFIX="${{ steps.version.outputs.suffix }}"
          if [ "$SUFFIX" = "stable" ]; then
            DIR="build/libs/release"
          else
            DIR="build/libs/$SUFFIX"
          fi
          JAR=$(find "$DIR" -name "stashfinder-*.jar" ! -name "*-sources.jar" | head -1)
          echo "path=$JAR"          >> $GITHUB_OUTPUT
          echo "name=$(basename $JAR)" >> $GITHUB_OUTPUT

      # ── CHANGELOG'dan release notu al ───────────────────────
      - name: Extract release notes
        id: notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if [ -f CHANGELOG.md ]; then
            # Tag başlığından sonraki ilk bloğu al
            NOTES=$(awk "/^## ${TAG}/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
            if [ -z "$NOTES" ]; then
              NOTES="Release ${TAG}"
            fi
          else
            NOTES="Release ${TAG}"
          fi
          # Multiline output
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # ── GitHub Release oluştur ──────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       StashFinder ${{ steps.version.outputs.tag }}
          body:       ${{ steps.notes.outputs.notes }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          files:      ${{ steps.jar.outputs.path }}
          draft:      false